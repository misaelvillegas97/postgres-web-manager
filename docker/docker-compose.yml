# Production self-hosted stack: Web (nginx) + API + internal PostgreSQL metadata DB.
# Usage:
#   cp .env.production.example .env.production
#   docker compose --env-file .env.production -f docker/docker-compose.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PGSTUDIO_DB_USER:?PGSTUDIO_DB_USER is required}
      POSTGRES_PASSWORD: ${PGSTUDIO_DB_PASSWORD:?PGSTUDIO_DB_PASSWORD is required}
      POSTGRES_DB: ${PGSTUDIO_DB_NAME:?PGSTUDIO_DB_NAME is required}
    volumes:
      - pgstudio-data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"' ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pgstudio-internal

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:?CREDENTIALS_ENCRYPTION_KEY is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '3000'
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://localhost:3000/api/health >/dev/null || exit 1' ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
    networks:
      - pgstudio-internal

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    environment:
      API_PROXY_URL: http://api:3000
    ports:
      - '${PGSTUDIO_WEB_PORT:-8080}:80'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://localhost/ >/dev/null || exit 1' ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped
    networks:
      - pgstudio-internal

volumes:
  pgstudio-data:

networks:
  pgstudio-internal:
    driver: bridge
