version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://pgstudio:pgstudio@postgres:5432/pgstudio
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    ports:
      - '4200:80'
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pgstudio
      POSTGRES_PASSWORD: pgstudio
      POSTGRES_DB: pgstudio
    ports:
      - '5432:5432'
    volumes:
      - pgstudio-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pgstudio']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgstudio-data:
