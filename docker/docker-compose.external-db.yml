# Production stack for externally managed PgStudio metadata PostgreSQL.
# Usage:
#   cp .env.production.example .env.production
#   set DATABASE_URL to your managed PostgreSQL URL
#   docker compose --env-file .env.production -f docker/docker-compose.external-db.yml up -d --build

services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:?CREDENTIALS_ENCRYPTION_KEY is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
    expose:
      - '3000'
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://localhost:3000/api/health >/dev/null || exit 1' ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
    networks:
      - pgstudio-internal

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    environment:
      API_PROXY_URL: http://api:3000
    ports:
      - '${PGSTUDIO_WEB_PORT:-8080}:80'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://localhost/ >/dev/null || exit 1' ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped
    networks:
      - pgstudio-internal

networks:
  pgstudio-internal:
    driver: bridge
