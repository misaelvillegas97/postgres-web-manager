<div class="shell">
  <header class="topbar">
    <div class="topbar__left">
      <a class="topbar__logo" routerLink="/">PgStudio Gateway</a>
      @if (conn.activeConnection; as active) {
        <div class="topbar__conn-badge">
          <span class="topbar__conn-dot"></span>
          <span class="topbar__conn-text">{{ active.name }} / {{ active.database }}</span>
        </div>
      }
    </div>

    <nav class="topbar__nav">
      <a [routerLinkActiveOptions]="{exact:true}" class="nav-link" routerLink="/workspace"
         routerLinkActive="nav-link--active">
        <span class="material-symbols-outlined">code</span>
        Query
      </a>
      <a class="nav-link" routerLink="/connections" routerLinkActive="nav-link--active">
        <span class="material-symbols-outlined">cable</span>
        Connections
      </a>
    </nav>

    <div class="topbar__right">
      @if (auth.user(); as u) {
        <span class="topbar__user">{{ u.email }}</span>
      }
      <button (click)="auth.logout()" class="topbar__signout">
        <span class="material-symbols-outlined">logout</span>
        Sign out
      </button>
    </div>
  </header>

  <main class="shell__content">
    <router-outlet />
  </main>
</div>
