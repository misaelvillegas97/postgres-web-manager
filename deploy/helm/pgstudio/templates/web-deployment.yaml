apiVersion: apps/v1
kind: Deployment
metadata:
  name: { { include "pgstudio.fullname" . } }-web
  labels:
    {{- include "pgstudio.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: { { .Values.replicaCount.web } }
  selector:
    matchLabels:
      app.kubernetes.io/instance: { { .Release.Name } }
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        { { - include "pgstudio.labels" . | nindent 8 } }
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.web.repository }}:{{ .Values.image.web.tag }}"
          imagePullPolicy: { { .Values.image.web.pullPolicy } }
          ports:
            - name: http
              containerPort: 80
          env:
            - name: API_PROXY_URL
              valueFrom:
                configMapKeyRef:
                  name: { { include "pgstudio.fullname" . } }-config
                  key: API_PROXY_URL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            { { - toYaml .Values.resources.web | nindent 12 } }
