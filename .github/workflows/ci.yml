name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pgstudio
          POSTGRES_PASSWORD: pgstudio
          POSTGRES_DB: pgstudio
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      # Format check
      - run: npm exec nx format:check -- --base="remotes/origin/main"

      # Build + lint + test all affected projects
      - name: Lint
        run: npm exec nx run-many -- -t lint --parallel=3

      - name: Build contracts
        run: npm exec nx build @postgres-web-manager/contracts

      - name: Build API
        run: npm exec nx build @org/api

      - name: Build Web
        run: npm exec nx build web

      - name: Unit tests
        run: npm exec nx run-many -- -t test --parallel=2
        env:
          DATABASE_URL: postgresql://pgstudio:pgstudio@localhost:5432/pgstudio
          JWT_SECRET: ci-test-secret-do-not-use-in-production-0001
          JWT_REFRESH_SECRET: ci-refresh-secret-do-not-use-in-production-0001
          CREDENTIALS_ENCRYPTION_KEY: 'ci-credentials-encryption-key-0001'

      - name: API e2e tests
        run: npm exec nx e2e @org/api-e2e
        env:
          DATABASE_URL: postgresql://pgstudio:pgstudio@localhost:5432/pgstudio
          JWT_SECRET: ci-test-secret-do-not-use-in-production-0001
          JWT_REFRESH_SECRET: ci-refresh-secret-do-not-use-in-production-0001
          CREDENTIALS_ENCRYPTION_KEY: 'ci-credentials-encryption-key-0001'
